<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Cursor Worm</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #1b1b1b, #000000);
      overflow: hidden;
      cursor: crosshair;
    }
    svg {
      width: 100vw;
      height: 100vh;
      display: block;
      /* Add a glowing neon shadow effect to the entire SVG space */
      filter: drop-shadow(0 0 12px rgba(0, 255, 255, 0.5));
    }
    .grid {
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-size: 50px 50px;
      /* Subtle cyberpunk background grid */
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Define the worm body shape without hardcoded fill to allow JS dynamic coloring -->
      <path id="seg" d="M0,0 C-20,-40 20,-40 0,0 Z" />
    </defs>
  </svg>

  <script>
    const svg = document.getElementById("canvas");
    const N = 45; // Length of the worm
    const elems = [];
    let frm = 0;
    const rad = 1.2;
    let width = window.innerWidth;
    let height = window.innerHeight;

    // Handle Window Resize dynamically
    window.addEventListener('resize', () => {
      width = window.innerWidth;
      height = window.innerHeight;
    });

    const pointer = { x: width / 2, y: height / 2 };
    
    // Desktop Mouse Tracking
    window.addEventListener("mousemove", (e) => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
    });
    
    // Mobile Touch Tracking
    window.addEventListener("touchmove", (e) => {
      pointer.x = e.touches[0].clientX;
      pointer.y = e.touches[0].clientY;
    });

    // Generate instances of the SVG segment path
    for (let i = 0; i < N; i++) {
      const use = document.createElementNS("http://www.w3.org/2000/svg", "use");
      use.setAttributeNS("http://www.w3.org/1999/xlink", "href", "#seg");
      svg.appendChild(use);
      elems.push({ x: pointer.x, y: pointer.y, use });
    }

    // Animation Loop
    const run = () => {
      frm += 0.03; // Speed of the color cycle and organic wobble
      requestAnimationFrame(run);

      let head = elems[0];
      
      // Organic drifting logic (so it moves even when the mouse is still)
      const ax = (Math.cos(3 * frm) * rad * width) / height;
      const ay = (Math.sin(4 * frm) * rad * height) / width;

      // Elastic pull towards the pointer location
      head.x += (ax + pointer.x - head.x) / 8;
      head.y += (ay + pointer.y - head.y) / 8;

      // Kinematics: the body segments naturally follow the head
      for (let i = 1; i < N; i++) {
        let e = elems[i];
        let ep = elems[i - 1];
        const a = Math.atan2(e.y - ep.y, e.x - ep.x);

        e.x += (ep.x - e.x + (Math.cos(a) * (100 - i)) / 5) / 4;
        e.y += (ep.y - e.y + (Math.sin(a) * (100 - i)) / 5) / 4;

        // Shrink the segments at the tail end
        const s = (162 + 4 * (1 - i)) / 50;

        e.use.setAttribute("transform", `translate(${(ep.x + e.x) / 2}, ${(ep.y + e.y) / 2}) rotate(${(180 / Math.PI) * a}) scale(${s})`);
        
        // Update coloring dynamically using Math and Frame counts for a "Rainbow Neon" effect
        const hue = (frm * 60 + i * 8) % 360;
        e.use.setAttribute("fill", `hsl(${hue}, 100%, 65%)`);
        e.use.setAttribute("opacity", Math.max(0.1, (N - i) / N)); // Tail becomes slightly transparent
      }
    };
    
    run();
  </script>
</body>
</html>
