<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Modern UI</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-panel dashboard-panel">
        <div class="dashboard-header">
            <div>
                <h1>Welcome, User!</h1>
                <p style="text-align: left; margin-bottom: 0;">Here's an overview of your account.</p>
            </div>
            <a href="index.html" class="btn-primary" style="text-decoration: none; color: white;">
                <i class='bx bx-log-out'></i> Logout
            </a>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <i class='bx bx-user-circle'></i>
                <h3>Profile</h3>
                <p>Manage your details</p>
            </div>
            <div class="stat-card">
                <i class='bx bx-bar-chart-alt-2'></i>
                <h3>Statistics</h3>
                <p>View your activity</p>
            </div>
            <div class="stat-card">
                <i class='bx bx-cog'></i>
                <h3>Settings</h3>
                <p>App preferences</p>
            </div>
        </div>
    </div>
</body>
</html>
