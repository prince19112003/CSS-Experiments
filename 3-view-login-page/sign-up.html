<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Modern UI</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-panel">
        <a href="index.html" class="back-link"><i class='bx bx-chevron-left'></i> Back to Home</a>
        
        <h2>Get Started</h2>
        <p>Create your new account in seconds.</p>
        
        <form action="dashboard.html">
            <div class="form-group">
                <input type="text" id="fullname" placeholder=" " required>
                <i class='bx bx-user'></i>
                <label for="fullname">Full Name</label>
            </div>
            
            <div class="form-group">
                <input type="email" id="email" placeholder=" " required>
                <i class='bx bx-envelope'></i>
                <label for="email">Email Address</label>
            </div>
            
            <div class="form-group">
                <input type="password" id="password" placeholder=" " required>
                <i class='bx bx-lock-alt'></i>
                <label for="password">Password</label>
            </div>
            
            <div class="form-group">
                <input type="password" id="confirm-password" placeholder=" " required>
                <i class='bx bx-check-shield'></i>
                <label for="confirm-password">Confirm Password</label>
            </div>
            
            <div class="form-options">
                <label>
                    <input type="checkbox" id="terms" required>
                    I agree to the Terms & Conditions
                </label>
            </div>
            
            <button type="submit" class="btn-primary">Sign Up</button>
            
            <div class="login-footer">
                Already have an account? <a href="sign_in.html" class="link">Sign In</a>
            </div>
        </form>
    </div>
</body>
</html>
