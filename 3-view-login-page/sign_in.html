<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Modern UI</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-panel">
        <a href="index.html" class="back-link"><i class='bx bx-chevron-left'></i> Back to Home</a>
        
        <h2>Welcome back!</h2>
        <p>Sign in to continue your journey.</p>
        
        <form action="dashboard.html">
            <div class="form-group">
                <input type="email" id="email" placeholder=" " required>
                <i class='bx bx-envelope'></i>
                <label for="email">Email Address</label>
            </div>
            
            <div class="form-group">
                <input type="password" id="password" placeholder=" " required>
                <i class='bx bx-lock-alt'></i>
                <label for="password">Password</label>
            </div>
            
            <div class="form-options">
                <label>
                    <input type="checkbox" id="remember">
                    Remember me
                </label>
                <a href="forgot_password.html" class="link">Forgot Password?</a>
            </div>
            
            <!-- Using a button element instead of input to act as a proper submit taking you to dashboard.html -->
            <button type="submit" class="btn-primary">Sign In</button>
            
            <div class="login-footer">
                Don't have an account? <a href="sign-up.html" class="link">Sign Up</a>
            </div>
        </form>
    </div>
</body>
</html>
